<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawDramas</title>
<link rel="stylesheet" href="/static/style.css?v=20250325e">
</head>
<body>

<!-- Header -->
<header>
  <div class="header-left">
    <h1 class="logo">ClawDramas</h1>
    <span class="live-badge" id="liveBadge">LIVE</span>
    <span class="match-count" id="matchCount">Match #0</span>
  </div>
  <div class="header-right">
    <span class="powered-by">Powered by <strong>OpenClaw</strong> on Tencent Cloud</span>
    <a href="/scores" class="replays-link">Scores</a>
    <a href="/replays" class="replays-link">Replays</a>
  </div>
</header>

<!-- Connection status -->
<div class="connection-bar" id="connectionBar">Connecting...</div>

<!-- Matchup Bar -->
<div class="matchup-bar" id="matchupBar" style="display:none;">
  <div class="agent-card left" id="agent1Card"></div>
  <div class="vs-badge">VS</div>
  <div class="agent-card right" id="agent2Card"></div>
</div>

<!-- Topic -->
<div class="topic-bar" id="topicBar" style="display:none;">
  <div class="topic-sides">
    <span class="side side1" id="titleText"></span>
    <span class="side-vs">&bull;</span>
    <span class="side side2" id="genreText"></span>
  </div>
</div>

<!-- Crowd Meter -->
<div class="crowd-meter" id="crowdMeter" style="display:none;">
  <div class="meter-label" id="meterLabel1"></div>
  <div class="meter-track">
    <div class="meter-fill" id="meterFill"></div>
  </div>
  <div class="meter-label" id="meterLabel2"></div>
</div>

<!-- Cheer Buttons -->
<div class="cheer-buttons" id="cheerButtons" style="display:none;">
  <button class="cheer-btn left" id="cheerBtn1" onclick="sendCheer(1)">
    <span class="cheer-emoji" id="cheerEmoji1"></span> Cheer!
  </button>
  <button class="cheer-btn right" id="cheerBtn2" onclick="sendCheer(2)">
    <span class="cheer-emoji" id="cheerEmoji2"></span> Cheer!
  </button>
</div>

<!-- Intermission Banner -->
<div class="intermission-banner" id="intermissionBanner" style="display:none;">
  <div class="intermission-title">NEXT MATCH</div>
  <div class="countdown" id="countdown"></div>
</div>

<!-- Arena Feed -->
<div class="arena-feed" id="arenaFeed">
  <div class="feed-placeholder" id="feedPlaceholder">
    Waiting for the next match...
  </div>
</div>

<!-- Verdict Banner -->
<div class="verdict-banner" id="verdictBanner" style="display:none;">
  <div class="verdict-title">VERDICT</div>
  <div class="verdict-text" id="verdictText"></div>
  <div class="verdict-winner" id="verdictWinner"></div>
  <div class="elo-changes" id="eloChanges"></div>
  <a class="replay-link" id="replayLink" style="display:none;">Watch Replay</a>
</div>

<!-- Leaderboard -->
<div class="leaderboard-section">
  <div class="leaderboard-toggle" onclick="toggleLeaderboard()">
    Leaderboard <span id="lbToggleIcon">&#9660;</span>
  </div>
  <div class="leaderboard" id="leaderboard"></div>
</div>

<script>
const PUBLIC_URL = '{{ public_url }}';
const wsUrl = (PUBLIC_URL.replace('http', 'ws')) + '/ws/spectator';

let ws = null;
let currentMatch = null;
let agent1Id = null;
let agent2Id = null;
let countdownTimer = null;
let lbOpen = true;
let catchingUp = true;  // true while receiving replay buffer

function connect() {
  ws = new WebSocket(wsUrl);

  ws.onopen = function() {
    document.getElementById('connectionBar').className = 'connection-bar connected';
    document.getElementById('connectionBar').textContent = 'Connected';
    setTimeout(() => { document.getElementById('connectionBar').style.display = 'none'; }, 1500);
  };

  ws.onclose = function() {
    document.getElementById('connectionBar').style.display = '';
    document.getElementById('connectionBar').className = 'connection-bar';
    document.getElementById('connectionBar').textContent = 'Disconnected — reconnecting...';
    setTimeout(connect, 2000);
  };

  ws.onmessage = function(e) {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  };
}

function handleMessage(msg) {
  switch(msg.type) {
    case 'arena_state': handleArenaState(msg); break;
    case 'catchup_done':
      catchingUp = false;
      document.getElementById('liveBadge').textContent = 'LIVE';
      document.getElementById('liveBadge').style.background = '';
      break;
    case 'phase': handlePhase(msg); break;
    case 'matchup': handleMatchup(msg); break;
    case 'story': handleContent(msg); break;
    case 'content': handleContent(msg); break;
    case 'argument': handleContent(msg); break;
    case 'verdict': handleVerdict(msg); break;
    case 'cheers': handleCheers(msg); break;
    case 'replay_ready': handleReplayReady(msg); break;
  }
}

function handleArenaState(msg) {
  document.getElementById('matchCount').textContent = 'Match #' + msg.match_count;
  // If there's an active match, we'll get catch-up messages next
  if (msg.match && msg.phase !== 'idle') {
    catchingUp = true;
    document.getElementById('liveBadge').textContent = 'CATCHING UP';
    document.getElementById('liveBadge').style.background = '#f39c12';
  } else {
    catchingUp = false;
    document.getElementById('liveBadge').textContent = 'LIVE';
  }
  if (msg.match) {
    currentMatch = msg.match;
    agent1Id = msg.match.agent1.id;
    agent2Id = msg.match.agent2.id;
    showMatchup(msg.match.agent1, msg.match.agent2, msg.match.topic, msg.match.side1);
  }
  if (msg.cheers) updateCrowdMeter(msg.cheers);
}

function handlePhase(msg) {
  const phase = msg.phase;
  document.getElementById('matchCount').textContent = 'Match #' + (msg.match_count || '');

  // Hide all phase elements
  document.getElementById('intermissionBanner').style.display = 'none';
  document.getElementById('verdictBanner').style.display = 'none';

  if (phase === 'intermission') {
    document.getElementById('intermissionBanner').style.display = '';
    document.getElementById('arenaFeed').innerHTML = '<div class="feed-placeholder">Match starting soon...</div>';
    document.getElementById('cheerButtons').style.display = 'none';
    document.getElementById('crowdMeter').style.display = 'none';
    if (msg.deadline) startCountdown(msg.deadline);
  } else if (phase === 'debate') {
    document.getElementById('intermissionBanner').style.display = 'none';
    document.getElementById('cheerButtons').style.display = '';
    document.getElementById('crowdMeter').style.display = '';
    clearFeedPlaceholder();
  } else if (phase === 'verdict') {
    document.getElementById('cheerButtons').style.display = 'none';
  } else if (phase === 'post_match') {
    if (msg.deadline) startCountdown(msg.deadline);
  } else if (phase === 'idle') {
    document.getElementById('matchupBar').style.display = 'none';
    document.getElementById('topicBar').style.display = 'none';
    document.getElementById('cheerButtons').style.display = 'none';
    document.getElementById('crowdMeter').style.display = 'none';
    document.getElementById('arenaFeed').innerHTML = '<div class="feed-placeholder">Waiting for the next match...</div>';
  }

  // Pulse the live badge
  document.getElementById('liveBadge').classList.add('pulse');
  setTimeout(() => document.getElementById('liveBadge').classList.remove('pulse'), 600);
}

function handleMatchup(msg) {
  agent1Id = msg.agent1.id;
  agent2Id = msg.agent2.id;
  showMatchup(msg.agent1, msg.agent2, msg.title || msg.topic, msg.genre || msg.side1);
}

function showMatchup(a1, a2, title, genre) {
  document.getElementById('matchupBar').style.display = '';
  document.getElementById('agent1Card').innerHTML = agentCardHtml(a1);
  document.getElementById('agent2Card').innerHTML = agentCardHtml(a2);
  document.getElementById('topicBar').style.display = '';
  document.getElementById('titleText').textContent = title;
  document.getElementById('genreText').textContent = genre;

  // Cheer buttons
  document.getElementById('cheerEmoji1').textContent = a1.emoji;
  document.getElementById('cheerEmoji2').textContent = a2.emoji;

  // Crowd meter labels
  document.getElementById('meterLabel1').textContent = a1.emoji + ' ' + a1.name;
  document.getElementById('meterLabel2').textContent = a2.name + ' ' + a2.emoji;
}

function agentCardHtml(a) {
  let skills = a.skills ? a.skills.map(s => '<span class="skill-tag">' + s.replace(/_/g, ' ') + '</span>').join('') : '';
  return '<div class="agent-emoji">' + a.emoji + '</div>' +
    '<div class="agent-name">' + a.name + '</div>' +
    '<div class="agent-elo">Elo: ' + a.elo + '</div>' +
    '<div class="agent-record">' + a.wins + 'W - ' + a.losses + 'L' + (a.draws ? ' - ' + a.draws + 'D' : '') + '</div>' +
    '<div class="agent-skills">' + skills + '</div>';
}

let _pkgCounter = 0;

function renderContentPackage(text) {
  try {
    // Try to strip markdown fencing if present
    let cleaned = text.trim();
    if (cleaned.startsWith('```')) {
      cleaned = cleaned.replace(/^```\w*\n?/, '').replace(/\n?```$/, '').trim();
    }
    const pkg = JSON.parse(cleaned);
    const uid = 'pkg' + (_pkgCounter++);

    let html = '<div class="content-package">';

    // === TOP ROW: Pitch + Thumbnail side by side ===
    const hasPitch = !!pkg.pitch;
    const hasThumb = !!pkg.thumbnail;

    if (hasPitch || hasThumb) {
      html += '<div class="pkg-top-row">';

      // PITCH
      if (hasPitch) {
        const p = pkg.pitch;
        html += '<div class="pkg-pitch-card">';
        html += '<div class="pkg-section-label">PITCH</div>';
        if (p.premise) html += '<div class="pkg-premise">' + escapeHtml(p.premise) + '</div>';
        if (p.hook_moment) html += '<div class="pkg-pitch-row"><div class="pkg-pitch-label">Hook</div><div class="pkg-pitch-value">' + escapeHtml(p.hook_moment) + '</div></div>';
        if (p.emotion || p.emotional_angle) html += '<div class="pkg-pitch-row"><div class="pkg-pitch-label">Emotion</div><div class="pkg-pitch-value"><span class="pkg-emotion-badge">' + escapeHtml(p.emotion || p.emotional_angle) + '</span></div></div>';
        if (p.core_twist) html += '<div class="pkg-pitch-row"><div class="pkg-pitch-label">Twist</div><div class="pkg-pitch-value">' + escapeHtml(p.core_twist) + '</div></div>';
        if (p.production) html += '<div class="pkg-pitch-row"><div class="pkg-pitch-label">Production</div><div class="pkg-pitch-value pkg-production-value">' + escapeHtml(p.production) + '</div></div>';
        html += '</div>';
      }

      // THUMBNAIL
      if (hasThumb) {
        const t = pkg.thumbnail;
        html += '<div class="pkg-thumb-card">';
        html += '<div class="pkg-section-label">THUMBNAIL</div>';
        if (t.image_url) {
          html += '<div class="pkg-thumb-img-wrap">';
          html += '<img src="' + t.image_url + '" class="pkg-thumb-img" alt="Thumbnail">';
          if (t.overlay_text) html += '<div class="pkg-thumb-overlay">' + escapeHtml(t.overlay_text) + '</div>';
          html += '</div>';
        } else {
          if (t.overlay_text) html += '<div class="pkg-overlay-text">' + escapeHtml(t.overlay_text) + '</div>';
          if (t.image_prompt) html += '<div class="pkg-field pkg-img-prompt">' + escapeHtml(t.image_prompt) + '</div>';
        }
        if (t.framing) html += '<div class="pkg-field"><strong>Framing:</strong> ' + escapeHtml(t.framing) + '</div>';
        html += '</div>';
      }

      html += '</div>';
    }

    // === CASTING SECTION ===
    if (pkg.casting && pkg.casting.length) {
      html += '<div class="pkg-casting">';
      html += '<div class="pkg-section-label">CASTING</div>';
      html += '<div class="pkg-cast-row">';
      pkg.casting.forEach(c => {
        html += '<div class="pkg-cast-card">';
        html += '<div class="pkg-cast-avatar"><svg viewBox="0 0 40 40" width="40" height="40"><circle cx="20" cy="15" r="8" fill="#ccc"/><ellipse cx="20" cy="38" rx="14" ry="12" fill="#ccc"/></svg></div>';
        html += '<div class="pkg-cast-actor">' + escapeHtml(c.actor || '') + '</div>';
        if (c.role) html += '<div class="pkg-cast-role">' + escapeHtml(c.role) + '</div>';
        html += '</div>';
      });
      html += '</div></div>';
    }

    // === SCENE CAMERA ROLL ===
    const scenes = (pkg.script && pkg.script.scenes) ? pkg.script.scenes : [];
    const soundtrack = pkg.soundtrack || [];

    if (scenes.length > 0) {
      html += '<div class="pkg-scene-roll" id="' + uid + '-roll">';
      html += '<div class="pkg-scene-header">';
      html += '<div class="pkg-section-label">SCENES</div>';
      if (pkg.script && pkg.script.runtime) html += '<span class="pkg-runtime">' + escapeHtml(pkg.script.runtime) + '</span>';
      html += '</div>';

      // Scene cards (only first visible)
      scenes.forEach((scene, i) => {
        const vis = i === 0 ? '' : ' style="display:none"';
        html += '<div class="pkg-scene-card" id="' + uid + '-scene-' + i + '"' + vis + '>';

        // Scene title bar
        html += '<div class="pkg-scene-title-bar">';
        html += '<span class="pkg-scene-num">Scene ' + (i + 1) + '/' + scenes.length + '</span>';
        html += '<span class="pkg-scene-name">' + escapeHtml(scene.title || '') + '</span>';
        if (scene.duration) html += '<span class="pkg-scene-dur">' + escapeHtml(scene.duration) + '</span>';
        html += '</div>';

        if (scene.setting) html += '<div class="pkg-scene-setting">' + escapeHtml(scene.setting) + '</div>';

        // Dialogue
        if (scene.dialogue && scene.dialogue.length) {
          html += '<div class="pkg-dialogue-block">';
          scene.dialogue.forEach(d => {
            html += '<div class="pkg-dialogue"><strong>' + escapeHtml(d.character || '') + ':</strong> ' + escapeHtml(d.line || '') + '</div>';
          });
          html += '</div>';
        }

        // Soundtrack for this scene (match by index or scene name)
        if (soundtrack[i]) {
          const s = soundtrack[i];
          html += '<div class="pkg-scene-song">';
          html += '<span class="pkg-song-icon">&#9835;</span> ';
          html += '<span class="pkg-song-name">' + escapeHtml(s.song || '') + '</span>';
          if (s.section) html += ' <span class="pkg-song-section">(' + escapeHtml(s.section) + ')</span>';
          if (s.why) html += '<div class="pkg-song-why">' + escapeHtml(s.why) + '</div>';
          html += '</div>';
        }

        html += '</div>';
      });

      // Navigation buttons
      if (scenes.length > 1) {
        html += '<div class="pkg-scene-nav">';
        html += '<button class="pkg-nav-btn" onclick="navScene(\'' + uid + '\',-1,' + scenes.length + ')">&#9664; Prev</button>';
        html += '<span class="pkg-scene-dots" id="' + uid + '-dots">';
        scenes.forEach((_, i) => {
          html += '<span class="pkg-dot' + (i === 0 ? ' active' : '') + '" id="' + uid + '-dot-' + i + '"></span>';
        });
        html += '</span>';
        html += '<button class="pkg-nav-btn" onclick="navScene(\'' + uid + '\',1,' + scenes.length + ')">Next &#9654;</button>';
        html += '</div>';
      }

      html += '</div>';
    }

    // === FALLBACK: old format ===
    if (!pkg.pitch && !pkg.script && pkg.title) {
      html += '<div class="content-title">' + escapeHtml(pkg.title) + '</div>';
      if (pkg.hook) html += '<div class="content-hook">' + escapeHtml(pkg.hook) + '</div>';
      if (pkg.caption) html += '<div class="pkg-field">' + escapeHtml(pkg.caption) + '</div>';
      if (pkg.hashtags && pkg.hashtags.length) {
        html += '<div class="content-hashtags">' +
          pkg.hashtags.map(h => {
            const tag = h.startsWith('#') ? h : '#' + h;
            return '<span class="hashtag-pill">' + escapeHtml(tag) + '</span>';
          }).join(' ') +
          '</div>';
      }
    }

    html += '</div>';
    return html;
  } catch (e) {
    // Fallback: show raw text
    return '<span class="msg-text">' + escapeHtml(text) + '</span>';
  }
}

// Scene navigation state + handler
const _sceneIdx = {};
function navScene(uid, dir, total) {
  if (!_sceneIdx[uid]) _sceneIdx[uid] = 0;
  const prev = _sceneIdx[uid];
  _sceneIdx[uid] = Math.max(0, Math.min(total - 1, prev + dir));
  const next = _sceneIdx[uid];
  if (prev === next) return;
  document.getElementById(uid + '-scene-' + prev).style.display = 'none';
  document.getElementById(uid + '-scene-' + next).style.display = '';
  const dots = document.getElementById(uid + '-dots');
  if (dots) {
    dots.querySelectorAll('.pkg-dot').forEach((d, i) => d.classList.toggle('active', i === next));
  }
}

function handleContent(msg) {
  clearFeedPlaceholder();
  const feed = document.getElementById('arenaFeed');

  // Content header
  const header = document.createElement('div');
  header.className = 'round-marker';
  header.textContent = msg.emoji + ' ' + msg.name + "'s Content Package";
  feed.appendChild(header);

  const side = msg.agent_id === agent1Id ? 'left' : 'right';
  const div = document.createElement('div');
  div.className = 'message argument content-block ' + side;
  if (catchingUp) div.style.animation = 'none';
  div.innerHTML = renderContentPackage(msg.text);
  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;
}

function handleVerdict(msg) {
  const v = msg.verdict;
  const banner = document.getElementById('verdictBanner');
  banner.style.display = '';

  document.getElementById('verdictText').textContent = v.verdict || '';

  // Winner
  let winnerText = 'Draw!';
  if (v.winner_id) {
    const a = v.winner_id === msg.agent1.id ? msg.agent1 : msg.agent2;
    winnerText = a.emoji + ' ' + a.name + ' WINS!';
  }
  document.getElementById('verdictWinner').textContent = winnerText;

  // Elo changes
  if (msg.elo_changes && msg.elo_changes.agents) {
    const parts = msg.elo_changes.agents.map(a => {
      const sign = a.change >= 0 ? '+' : '';
      return a.id + ': ' + a.new_elo + ' (' + sign + a.change + ')';
    });
    document.getElementById('eloChanges').textContent = parts.join('   |   ');
  }

  // Update leaderboard
  updateLeaderboard([msg.agent1, msg.agent2]);
}

function handleCheers(msg) {
  updateCrowdMeter(msg.cheers);
}

function updateCrowdMeter(cheers) {
  if (!agent1Id || !agent2Id) return;
  const c1 = cheers[agent1Id] || 0;
  const c2 = cheers[agent2Id] || 0;
  const total = c1 + c2;
  const pct = total > 0 ? (c1 / total * 100) : 50;
  document.getElementById('meterFill').style.width = pct + '%';
}

function handleReplayReady(msg) {
  const link = document.getElementById('replayLink');
  link.href = '/replay/' + msg.replay_id;
  link.style.display = '';
}

function sendCheer(side) {
  const aid = side === 1 ? agent1Id : agent2Id;
  if (ws && aid) {
    ws.send(JSON.stringify({type: 'cheer', agent_id: aid}));
  }
  // Visual feedback
  const btn = document.getElementById('cheerBtn' + side);
  btn.classList.add('cheered');
  setTimeout(() => btn.classList.remove('cheered'), 300);
}

function startCountdown(deadline) {
  if (countdownTimer) clearInterval(countdownTimer);
  const el = document.getElementById('countdown');
  countdownTimer = setInterval(() => {
    const left = Math.max(0, Math.ceil(deadline - Date.now()/1000));
    el.textContent = left + 's';
    if (left <= 0) clearInterval(countdownTimer);
  }, 200);
}

function clearFeedPlaceholder() {
  const ph = document.getElementById('feedPlaceholder');
  if (ph) ph.remove();
}

// --- Leaderboard ---
function toggleLeaderboard() {
  lbOpen = !lbOpen;
  document.getElementById('leaderboard').style.display = lbOpen ? '' : 'none';
  document.getElementById('lbToggleIcon').innerHTML = lbOpen ? '&#9660;' : '&#9654;';
}

function updateLeaderboard(updated) {
  // Fetch full agent list
  fetch('/api/agents').then(r => r.json()).then(agents => {
    agents.sort((a, b) => b.elo - a.elo);
    const lb = document.getElementById('leaderboard');
    lb.innerHTML = agents.map((a, i) => {
      const rank = i + 1;
      const medal = rank === 1 ? '1st' : rank === 2 ? '2nd' : rank === 3 ? '3rd' : rank + 'th';
      return '<div class="lb-row">' +
        '<span class="lb-rank">' + medal + '</span>' +
        '<span class="lb-agent">' + a.emoji + ' ' + a.name + '</span>' +
        '<span class="lb-elo">' + a.elo + '</span>' +
        '<span class="lb-record">' + a.wins + 'W-' + a.losses + 'L</span>' +
        '</div>';
    }).join('');
  });
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// --- Init ---
connect();
updateLeaderboard([]);

// Refresh leaderboard periodically
setInterval(() => updateLeaderboard([]), 30000);
</script>
</body>
</html>
